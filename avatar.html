<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 第10000天专属头像</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
        }

        .avatar-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .avatar-preview {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .steps {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin-top: 30px;
        }

        .steps h3 {
            margin-bottom: 20px;
            color: #667eea;
        }

        .step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            color: #aaa;
        }

        .step-num {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .back-link {
            margin-top: 30px;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>🌍 第10000天专属头像</h1>
    <p class="subtitle">为你在这个特殊日子设计的纪念头像</p>

    <div class="avatar-container">
        <img src="avatar.svg" alt="10000天头像" class="avatar-preview" id="avatarImg">
    </div>

    <div>
        <a href="avatar.svg" download="10000-days-avatar.svg" class="btn">💾 下载 SVG 格式</a>
        <a href="avatar-png.html" class="btn">🖼️ 下载 PNG 格式</a>
    </div>

    <div class="steps">
        <h3>📤 如何设置为 GitHub 头像</h3>
        <div class="step">
            <span class="step-num">1</span>
            <span>点击上方按钮下载头像（建议下载 PNG 格式）</span>
        </div>
        <div class="step">
            <span class="step-num">2</span>
            <span>打开 GitHub，点击右上角头像 → Settings</span>
        </div>
        <div class="step">
            <span class="step-num">3</span>
            <span>在 Profile 页面点击当前头像</span>
        </div>
        <div class="step">
            <span class="step-num">4</span>
            <span>选择下载的头像文件，点击 Set new profile picture</span>
        </div>
    </div>

    <a href="index.html" class="back-link">← 返回纪念页面</a>


</body>
</html>
