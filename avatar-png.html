<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 下载第10000天头像 (PNG)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .canvas-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .tip {
            color: #888;
            font-size: 0.9em;
            margin-top: 20px;
            text-align: center;
            line-height: 1.6;
        }

        .back-link {
            margin-top: 30px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>🌍 第10000天专属头像</h1>
    <p class="subtitle">点击下方按钮下载 PNG 格式头像</p>

    <div class="canvas-container">
        <canvas id="avatarCanvas" width="400" height="400"></canvas>
    </div>

    <button class="btn" onclick="downloadPNG()">💾 下载 PNG 头像</button>

    <p class="tip">
        💡 提示：下载后可以直接上传到 GitHub 作为头像<br>
        也可以右键点击头像 → 图片另存为
    </p>

    <a href="index.html" class="back-link">← 返回纪念页面</a>

    <script>
        const canvas = document.getElementById('avatarCanvas');
        const ctx = canvas.getContext('2d');

        function drawAvatar() {
            const centerX = 200;
            const centerY = 200;
            const radius = 190;

            // 背景渐变
            const bgGrad = ctx.createLinearGradient(0, 0, 400, 400);
            bgGrad.addColorStop(0, '#1a1a2e');
            bgGrad.addColorStop(0.5, '#16213e');
            bgGrad.addColorStop(1, '#0f3460');
            
            ctx.fillStyle = bgGrad;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fill();

            // 外发光环
            const glowGrad = ctx.createRadialGradient(centerX, centerY, 150, centerX, centerY, 190);
            glowGrad.addColorStop(0, 'rgba(102, 126, 234, 0.8)');
            glowGrad.addColorStop(0.5, 'rgba(118, 75, 162, 0.4)');
            glowGrad.addColorStop(1, 'rgba(118, 75, 162, 0)');
            
            ctx.strokeStyle = glowGrad;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 180, 0, Math.PI * 2);
            ctx.stroke();

            // 星星装饰
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            const stars = [
                {x: 80, y: 120, r: 2},
                {x: 320, y: 100, r: 3},
                {x: 100, y: 300, r: 2},
                {x: 310, y: 280, r: 2},
                {x: 60, y: 200, r: 1.5},
                {x: 340, y: 200, r: 1.5},
                {x: 200, y: 60, r: 2},
                {x: 200, y: 340, r: 2}
            ];
            
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                ctx.fill();
            });

            // 主数字 10000
            const numGrad = ctx.createLinearGradient(100, 150, 300, 180);
            numGrad.addColorStop(0, '#f093fb');
            numGrad.addColorStop(1, '#f5576c');
            
            ctx.font = 'bold 72px Arial, sans-serif';
            ctx.fillStyle = numGrad;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('10000', centerX, 160);

            // DAYS
            ctx.font = '24px Arial, sans-serif';
            ctx.fillStyle = '#888';
            ctx.fillText('DAYS', centerX, 210);

            // 地球图标
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, 280, 25, 0, Math.PI * 2);
            ctx.stroke();

            // 地球网格线
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.ellipse(centerX, 280, 25, 10, 0, 0, Math.PI * 2);
            ctx.stroke();

            // 绿色大陆
            ctx.globalAlpha = 0.8;
            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(180, 270);
            ctx.quadraticCurveTo(200, 285, 220, 270);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(180, 290);
            ctx.quadraticCurveTo(200, 275, 220, 290);
            ctx.stroke();

            // 地球中心
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.beginPath();
            ctx.arc(centerX, 280, 8, 0, Math.PI * 2);
            ctx.fill();

            // 恢复透明度
            ctx.globalAlpha = 1;

            // 底部文字
            ctx.font = '12px Arial, sans-serif';
            ctx.fillStyle = '#666';
            ctx.fillText('EARTH DAY 10000', centerX, 340);

            // 装饰虚线圆环
            ctx.strokeStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(centerX, centerY, 170, 0, Math.PI * 2);
            ctx.stroke();
        }

        // 绘制头像
        drawAvatar();

        // 下载 PNG
        function downloadPNG() {
            const link = document.createElement('a');
            link.download = '10000-days-avatar.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
