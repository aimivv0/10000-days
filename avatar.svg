<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    
    <!-- 光环渐变 -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0"/>
    </radialGradient>
    
    <!-- 数字渐变 -->
    <linearGradient id="numGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)"/>
  
  <!-- 外发光环 -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#glowGrad)" stroke-width="4"/>
  
  <!-- 星星装饰 -->
  <g fill="#fff" opacity="0.8">
    <circle cx="80" cy="120" r="2"/>
    <circle cx="320" cy="100" r="3"/>
    <circle cx="100" cy="300" r="2"/>
    <circle cx="310" cy="280" r="2"/>
    <circle cx="60" cy="200" r="1.5"/>
    <circle cx="340" cy="200" r="1.5"/>
    <circle cx="200" cy="60" r="2"/>
    <circle cx="200" cy="340" r="2"/>
  </g>
  
  <!-- 主数字 10000 -->
  <text x="200" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#numGrad)">10000</text>
  
  <!-- 天 -->
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#888">DAYS</text>
  
  <!-- 地球图标 -->
  <g transform="translate(200, 280)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#667eea" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="#667eea" stroke-width="1" opacity="0.5"/>
    <path d="M -20 -10 Q 0 5 20 -10" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.8"/>
    <path d="M -20 10 Q 0 -5 20 10" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="#667eea" opacity="0.3"/>
  </g>
  
  <!-- 日期标记 -->
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">EARTH DAY 10000</text>
  
  <!-- 装饰圆环 -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#667eea" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
</svg>
